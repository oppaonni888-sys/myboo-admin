<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OP連線">
<meta name="theme-color" content="#1A1A2E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>OPPA&ONNI 連線系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: #F0F4F8; min-height: 100vh; }

/* Nav */
.nav { background: #1A1A2E; display: flex; }
.nav-btn { flex: 1; padding: 16px; color: rgba(255,255,255,0.6); border: none; background: none; font-size: 13px; cursor: pointer; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-btn.active { color: #FFD166; border-bottom: 2px solid #FFD166; }

/* Page */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* Header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.page-title { font-size: 18px; font-weight: 700; color: #1A1A2E; }

/* Button */
.btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-primary { background: #1A1A2E; color: white; }
.btn-secondary { background: white; color: #1A1A2E; border: 1px solid #ddd; }
.btn-danger { background: #E63946; color: white; }
.btn-sm { padding: 7px 14px; font-size: 13px; }

/* Card */
.card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-body { padding: 14px 16px; }

/* Product card */
.product-card { display: flex; gap: 12px; align-items: center; }
.product-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #eee; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden; }
.product-thumb img { width: 100%; height: 100%; object-fit: cover; }
.product-info { flex: 1; min-width: 0; }
.product-name { font-weight: 600; font-size: 15px; }
.product-meta { font-size: 13px; color: #666; margin-top: 2px; }
.product-price { font-size: 15px; font-weight: 600; color: #1A1A2E; }
.product-actions { display: flex; gap: 6px; }

/* Badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge-green { background: #D8F3DC; color: #2D6A4F; }
.badge-red { background: #FFE0E0; color: #C62828; }
.badge-orange { background: #FFF3E0; color: #E65100; }
.badge-blue { background: #E3F2FD; color: #1565C0; }

/* Order card */
.order-card { }
.order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.order-customer { font-weight: 600; font-size: 15px; }
.order-time { font-size: 12px; color: #999; }
.order-product { font-size: 14px; color: #444; margin-bottom: 6px; }
.order-footer { display: flex; justify-content: space-between; align-items: center; }
.order-amount { font-weight: 700; font-size: 16px; color: #1A1A2E; }

/* Status select */
.status-select { padding: 5px 10px; border-radius: 6px; font-size: 13px; border: 1px solid #ddd; font-family: inherit; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; padding: 24px 20px 40px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; }
.modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; line-height: 1; }

/* Form */
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: 500; color: #666; margin-bottom: 6px; }
input, select, textarea { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; font-family: inherit; outline: none; }
input:focus, select:focus { border-color: #4A90D9; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-actions { display: flex; gap: 10px; margin-top: 24px; }
.form-actions .btn { flex: 1; padding: 14px; font-size: 15px; }

/* Image upload */
.img-upload-row { display: flex; gap: 10px; margin-bottom: 12px; }
.img-upload-btn { flex: 1; border: 2px dashed #ddd; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; background: #fafafa; }
.img-upload-btn:active { background: #f0f0f0; }
.img-upload-btn svg { display: block; margin: 0 auto 6px; }
.img-upload-btn span { font-size: 13px; color: #666; }
.img-preview { display: flex; flex-wrap: wrap; gap: 8px; }
.img-preview-item { position: relative; width: 72px; height: 72px; border-radius: 8px; overflow: hidden; }
.img-preview-item img { width: 100%; height: 100%; object-fit: cover; }
.img-preview-item button { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); border: none; color: white; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1A1A2E; color: white; padding: 12px 24px; border-radius: 24px; font-size: 15px; font-weight: 500; z-index: 999; opacity: 0; transition: all 0.3s; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #E63946; }

/* Loading */
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 200; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.loading-overlay.show { display: flex; }
.spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top-color: #1A1A2E; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty */
.empty { text-align: center; padding: 48px 20px; color: #999; font-size: 15px; }

/* Search */
.search-bar { background: white; border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.search-bar input { border: none; font-size: 15px; outline: none; flex: 1; padding: 0; }

/* Stats row */
.stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.stat { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.stat-label { font-size: 12px; color: #999; margin-bottom: 4px; }
.stat-value { font-size: 24px; font-weight: 700; color: #1A1A2E; }

/* Filter */
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
.filter-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit; }
.filter-chip.active { background: #1A1A2E; color: white; border-color: #1A1A2E; }

/* Confirm */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; align-items: center; justify-content: center; padding: 20px; }
.confirm-overlay.open { display: flex; }
.confirm-box { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 320px; text-align: center; }
.confirm-box h3 { font-size: 17px; margin-bottom: 10px; }
.confirm-box p { font-size: 14px; color: #666; margin-bottom: 20px; }
.confirm-actions { display: flex; gap: 10px; }
.confirm-actions .btn { flex: 1; }
</style>
</head>

<!-- Nav -->
<div class="nav">
  <button class="nav-btn active" onclick="showPage('products')">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>

  <button class="nav-btn" onclick="showPage('dashboard')">

<!-- Products Page -->
<div id="page-products" class="page active">

<!-- Add/Edit Product Modal -->

          <span>圖庫</span>

        <div class="img-upload-btn" onclick="document.getElementById('img-camera').click()">
          <svg width="24" height="24" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span>拍照</span>

        <label>名稱 *</label>

      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>售價 *</label>

<!-- Confirm Modal -->

</div>

<script>
  // Cloudinary
  const CLOUD = "dnch0bbqj";
  const PRESET = "d9tlgi1u";
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBl2nep1UFBk2cAV3SH6XZwS6YnFD6tVh4",
  authDomain: "myboo-system.firebaseapp.com",
  projectId: "myboo-system",
  storageBucket: "myboo-system.firebasestorage.app",
  messagingSenderId: "350944472355",
  appId: "1:350944472355:web:049dd769dc12913f847096"
});
const db = getFirestore(app);

const LINE_TOKEN = 'fR9u+U6TS9jOKve/nIJ0DFwOhWea2e7fnlPD7wrBBZN0Rg2hgT58eynrFg7eFGF6eEho10BwwWP3xY7NsdT0KxAoNYrmR+7PVT94QrZb3wjxniqEDLf7zRCZObaTToGwUvZ57rgWJpQqLCdMyK4aXwdB04t89/1O/w1cDnyilFU=';

// State
let allProducts = [];
let allOrders = [];
let orderFilter = '';
let newImages = [];
let existingImages = [];

// ── UI ──────────────────────────────────────────
window.showPage = function(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const idx = ['products','orders','dashboard'].indexOf(page);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if (page === 'products') loadProducts();
  if (page === 'orders') loadOrders();
  if (page === 'dashboard') loadDashboard();
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'error' ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

function showLoading(msg = '處理中...') {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading').classList.add('show');
}

function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}

// ── PRODUCTS ────────────────────────────────────
async function loadProducts() {
  try {
    const snap = await getDocs(query(collection(db, 'products'), orderBy('code')));
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProducts(allProducts);
  } catch(e) {
    document.getElementById('products-list').innerHTML = '<div class="empty">載入失敗，請重試</div>';
    console.error(e);
  }
}

window.filterProducts = function() {
  const q = document.getElementById('product-search').value.toLowerCase();
  const filtered = allProducts.filter(p => 
    p.name?.toLowerCase().includes(q) || p.code?.toLowerCase().includes(q)
  );
  renderProducts(filtered);
}

function renderProducts(list) {
  if (!list.length) {
    document.getElementById('products-list').innerHTML = '<div class="empty">沒有商品</div>';
    return;
  }
  document.getElementById('products-list').innerHTML = list.map(p => `
    <div class="card">
      <div class="card-body">
        <div class="product-card">
          <div class="product-thumb">
            ${p.images?.[0] ? `<img src="${p.images[0]}">` : '📦'}
          </div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-meta">${p.code}${p.sizes ? ' · ' + p.sizes : ''}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
              <div class="product-price">$${Number(p.price).toLocaleString()}</div>
              <span class="badge ${p.stock <= 0 ? 'badge-red' : p.stock <= 3 ? 'badge-orange' : 'badge-green'}">${p.stock <= 0 ? '售完' : '庫存 ' + p.stock}</span>
            </div>
          </div>
          <div class="product-actions">
            <button class="btn btn-secondary btn-sm" onclick="editProduct('${p.id}')">編輯</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}','${p.name}')">刪除</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// ── PRODUCT MODAL ───────────────────────────────
window.openAddProduct = function() {
  document.getElementById('modal-title-text').textContent = '新增商品';
  document.getElementById('edit-id').value = '';
  ['p-code','p-name','p-price','p-stock','p-sizes','p-category'].forEach(id => document.getElementById(id).value = '');
  newImages = []; existingImages = [];
  document.getElementById('img-preview').innerHTML = '';
  document.getElementById('product-modal').classList.add('open');
}

window.editProduct = function(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal-title-text').textContent = '編輯商品';
  document.getElementById('edit-id').value = id;
  document.getElementById('p-code').value = p.code || '';
  document.getElementById('p-name').value = p.name || '';
  document.getElementById('p-price').value = p.price || '';
  document.getElementById('p-stock').value = p.stock || '';
  document.getElementById('p-sizes').value = p.sizes || '';
  document.getElementById('p-category').value = p.category || '';
  newImages = [];
  existingImages = p.images ? [...p.images] : [];
  renderPreview();
  document.getElementById('product-modal').classList.add('open');
}

window.closeProductModal = function() {
  document.getElementById('product-modal').classList.remove('open');
}

window.handleImages = function(e) {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => { newImages.push({ file, preview: ev.target.result }); renderPreview(); };
    reader.readAsDataURL(file);
  });
}

function renderPreview() {
  const el = document.getElementById('img-preview');
  const ex = existingImages.map((url, i) => `
    <div class="img-preview-item">
      <img src="${url}">
      <button onclick="removeExisting(${i})">×</button>
    </div>`).join('');
  const nw = newImages.map((img, i) => `
    <div class="img-preview-item">
      <img src="${img.preview}">
      <button onclick="removeNew(${i})">×</button>
    </div>`).join('');
  el.innerHTML = ex + nw;
}

window.removeExisting = function(i) { existingImages.splice(i,1); renderPreview(); }
window.removeNew = function(i) { newImages.splice(i,1); renderPreview(); }

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, { method: 'POST', body: fd });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.secure_url;
}

window.saveProduct = async function() {
  const code = document.getElementById('p-code').value.trim().toUpperCase();
  const name = document.getElementById('p-name').value.trim();
  const price = Number(document.getElementById('p-price').value);
  const stock = Number(document.getElementById('p-stock').value);
  const sizes = document.getElementById('p-sizes').value.trim();
  const category = document.getElementById('p-category').value.trim();
  const id = document.getElementById('edit-id').value;

  if (!code || !name || !price) { showToast('請填寫代號、名稱和價格', 'error'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '儲存中...';
  showLoading(newImages.length ? '上傳圖片中...' : '儲存中...');

  try {
    const newURLs = await Promise.all(newImages.map(img => uploadToCloudinary(img.file)));
    const images = [...existingImages, ...newURLs];
    const data = { code, name, price, stock, sizes, category, images, updatedAt: Timestamp.now() };

    if (id) {
      await updateDoc(doc(db, 'products', id), data);
    } else {
      data.createdAt = Timestamp.now();
      await addDoc(collection(db, 'products'), data);
    }

    hideLoading();
    btn.disabled = false;
    btn.textContent = '儲存商品';
    closeProductModal();
    showToast(id ? '✅ 商品已更新' : '✅ 商品已新增');
    loadProducts();
  } catch(e) {
    hideLoading();
    btn.disabled = false;
    btn.textContent = '儲存商品';
    showToast('儲存失敗：' + e.message, 'error');
    console.error(e);
  }
}

window.deleteProduct = function(id, name) {
  showConfirm(`確定刪除「${name}」？`, async () => {
    showLoading('刪除中...');
    try {
      await deleteDoc(doc(db, 'products', id));
      hideLoading();
      showToast('✅ 已刪除');
      loadProducts();
    } catch(e) { hideLoading(); showToast('刪除失敗', 'error'); }
  });
}

// ── ORDERS ──────────────────────────────────────
async function loadOrders() {
  try {
    const snap = await getDocs(query(collection(db, 'orders'), orderBy('createdAt', 'desc')));
    allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderOrders();
  } catch(e) {
    document.getElementById('orders-list').innerHTML = '<div class="empty">載入失敗</div>';
  }
}

window.setOrderFilter = function(status) {
  orderFilter = status;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const list = orderFilter ? allOrders.filter(o => o.status === orderFilter) : allOrders;
  if (!list.length) {
    document.getElementById('orders-list').innerHTML = '<div class="empty">沒有訂單</div>';
    return;
  }
  document.getElementById('orders-list').innerHTML = list.map(o => `
    <div class="card">
      <div class="card-body order-card">
        <div class="order-header">
          <div class="order-customer">${o.customerName || '—'}</div>
          <div class="order-time">${formatTime(o.createdAt)}</div>
        </div>
        <div class="order-product">${o.productCode || ''} ${o.productName || '—'} · ${o.size || '—'} · ${o.quantity || 1}件</div>
        <div class="order-footer">
          <div class="order-amount">$${Number(o.amount).toLocaleString()}</div>
          <select class="status-select" onchange="updateStatus('${o.id}', this.value, '${o.lineUserId || ''}', '${o.customerName || ''}', '${o.productName || ''}')">
            <option ${o.status==='待處理'?'selected':''}>待處理</option>
            <option ${o.status==='已出貨'?'selected':''}>已出貨</option>
            <option ${o.status==='已完成'?'selected':''}>已完成</option>
          </select>
        </div>
        <div style="margin-top:8px;text-align:right">
          <button class="btn btn-danger btn-sm" onclick="deleteOrder('${o.id}')">刪除</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.updateStatus = async function(id, status, lineUserId, customerName, productName) {
  try {
    await updateDoc(doc(db, 'orders', id), { status, updatedAt: Timestamp.now() });
    if (status === '已出貨' && lineUserId) {
      await fetch('https://api.line.me/v2/bot/message/push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${LINE_TOKEN}` },
        body: JSON.stringify({ to: lineUserId, messages: [{ type: 'text', text: `🚚 出貨通知\n\n${customerName} 您好！\n「${productName}」已出貨，請注意查收。\n\n感謝您的購買！🐾` }] })
      });
    }
    const o = allOrders.find(x => x.id === id);
    if (o) o.status = status;
    showToast('✅ 狀態已更新');
  } catch(e) { showToast('更新失敗', 'error'); }
}

window.deleteOrder = function(id) {
  showConfirm('確定刪除這筆訂單？', async () => {
    try {
      await deleteDoc(doc(db, 'orders', id));
      allOrders = allOrders.filter(o => o.id !== id);
      renderOrders();
      showToast('✅ 已刪除');
    } catch(e) { showToast('刪除失敗', 'error'); }
  });
}

window.confirmClear = function() {
  showConfirm('確定清空所有訂單？此操作無法復原！', async () => {
    showLoading('清空中...');
    try {
      const snap = await getDocs(collection(db, 'orders'));
      await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
      allOrders = [];
      renderOrders();
      hideLoading();
      showToast('✅ 訂單已清空');
    } catch(e) { hideLoading(); showToast('失敗', 'error'); }
  });
}

// ── DASHBOARD ───────────────────────────────────
async function loadDashboard() {
  try {
    const [pSnap, oSnap] = await Promise.all([
      getDocs(collection(db, 'products')),
      getDocs(collection(db, 'orders'))
    ]);
    const orders = oSnap.docs.map(d => d.data());
    document.getElementById('s-products').textContent = pSnap.size;
    document.getElementById('s-orders').textContent = orders.length;
    document.getElementById('s-pending').textContent = orders.filter(o => o.status === '待處理').length;
    document.getElementById('s-revenue').textContent = '$' + orders.reduce((s,o) => s + Number(o.amount||0), 0).toLocaleString();
  } catch(e) {}
}

window.exportCSV = function() {
  if (!allOrders.length) { showToast('沒有訂單', 'error'); return; }
  const rows = [['時間','顧客','代號','商品','尺寸','數量','金額','狀態']];
  allOrders.forEach(o => rows.push([formatTime(o.createdAt), o.customerName, o.productCode, o.productName, o.size, o.quantity, o.amount, o.status||'待處理']));
  const csv = rows.map(r => r.map(v => `"${v||''}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv'}));
  a.download = `orders_${new Date().toLocaleDateString('zh-TW')}.csv`;
  a.click();
  showToast('✅ 已匯出');
}

// ── HELPERS ─────────────────────────────────────
function formatTime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('zh-TW', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

let confirmCb = null;
window.showConfirm = function(msg, cb) {
  document.getElementById('confirm-msg').textContent = msg;
  confirmCb = cb;
  document.getElementById('confirm-ok').onclick = () => { closeConfirm(); cb(); };
  document.getElementById('confirm-modal').classList.add('open');
}
window.closeConfirm = function() {
  document.getElementById('confirm-modal').classList.remove('open');
}

// Init
loadProducts();
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW:', e));
}
</script>
